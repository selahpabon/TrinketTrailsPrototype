<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finish Trail</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f7f7; font-family: Manrope, Arial, sans-serif; }
      .panel { background: #ffffff; padding: 48px 56px; border-radius: 24px; box-shadow: 0 18px 42px rgba(0,0,0,0.12); text-align: center; }
      h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1; }
    </style>
  </head>
  <body>
    <div class="panel"><h1>You have ended the trail!</h1></div>
    <script>
      const ART_WALK_STARTED_KEY = 'trinket-trails-art-walk-started';
      const ART_WALK_FINISHED_KEY = 'trinket-trails-art-walk-finished';
      const ART_WALK_REWARD_PENDING_KEY = 'trinket-trails-art-walk-reward-pending';
      const ART_WALK_STAMP_PENDING_KEY = 'trinket-trails-art-walk-stamp-pending';
      if (sessionStorage.getItem(ART_WALK_STARTED_KEY) === 'true') {
        sessionStorage.setItem(ART_WALK_FINISHED_KEY, 'true');
        sessionStorage.setItem(ART_WALK_REWARD_PENDING_KEY, 'true');
        sessionStorage.setItem(ART_WALK_STAMP_PENDING_KEY, 'true');
      }
      setTimeout(() => { window.location.href = './ArtWalkPath.html'; }, 1200);
    </script>
  </body>
</html>
